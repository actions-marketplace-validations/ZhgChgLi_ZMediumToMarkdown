query PostPageQuery($postId: ID!, $postMeteringOptions: PostMeteringOptions, $includeShouldFollowPost: Boolean!) {
  postResult(id: $postId) {
    __typename
    ...PostResultError_postResult
    ... on Post {
      id
      collection {
        id
        googleAnalyticsId
        ...FloatingPublicationBio_collection
        ...MoreFromAuthorAndMaybePub_collection
        ...PostPublishersInfoSection_collection
        ...PublicationNav_collection
        __typename
      }
      content(postMeteringOptions: $postMeteringOptions) {
        isLockedPreviewOnly
        __typename
      }
      creator {
        id
        ...MastodonVerificationLink_user
        ...SuspendedBannerLoader_user
        ...MoreFromAuthorAndMaybePub_user
        ...PostPublishersInfoSection_user
        __typename
      }
      inResponseToEntityType
      isLocked
      ...Wall_post
      ...InteractivePostBody_post
      ...WithResponsesSidebar_post
      ...PostCanonicalizer_post
      ...PostFooterActionsBar_post
      ...PostReadTracker_post
      ...PostMetadata_post
      ...SuspendedBannerLoader_post
      ...PostFooterInfo_post
      ...PostBodyInserts_post
      ...PostNoteMissingToast_post
      ...usePostTracking_post
      ...InResponseToEntityPreview_post
      ...PostPublishedDialog_prerequisite_post
      ...PostResponses_post
      ...PostPublishersInfoSection_post
      ...UseSubscribeToAuthorOnScroll_post
      __typename
    }
  }
}

